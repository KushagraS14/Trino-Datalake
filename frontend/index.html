<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCAI Data Lake</title>
<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="background"></div>

<div class="login-wrapper">

    <div class="brand-panel">

        <div class="logo">
            <i class="fa-solid fa-database"></i>
        </div>

        <h1>TCAI Data Lake</h1>

        <p>
            Enterprise Data Lake & Analytics Platform
        </p>

        <ul>
            <li><i class="fa-solid fa-check"></i> Real-time Analytics</li>
            <li><i class="fa-solid fa-check"></i> AI Insights</li>
            <li><i class="fa-solid fa-check"></i> MinIO Storage</li>
            <li><i class="fa-solid fa-check"></i> Trino SQL Engine</li>
        </ul>

    </div>

    <div class="login-card">

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Sign in to continue
        </p>

        <form id="loginForm">

            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
               <input
    type="email"
    id="email"
    placeholder="Email Address"
    required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
               <input
    type="password"
    id="password"
    placeholder="Password"
    required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">
                    Forgot Password?
                </a>
            </div>

            <button type="submit">
                Sign In
            </button>

        </form>

        <div class="footer-text">
            Powered by The Celeritas AI
        </div>

    </div>

</div>

<script>
document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    if (
        email === "admin@tcai.com" &&
        password === "admin123"
    ) {
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid Email or Password");
    }
});
</script>
<script src="login.js"></script>
</body>

</html>
